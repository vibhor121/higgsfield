version: '3.8'

services:
  db:
    image: postgres:15
    container_name: higgsfield-db
    environment:
      POSTGRES_USER: vibhor
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: higgsfield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibhor -d higgsfield"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: higgsfield-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://vibhor:password123@db:5432/higgsfield?schema=public
      JWT_SECRET: change-this-secret-in-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
