services:
  db:
    image: postgres:15
    container_name: higgsfield-db
    environment:
      POSTGRES_USER: vibhor
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: higgsfield
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibhor -d higgsfield"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: higgsfield-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://vibhor:password123@db:5432/higgsfield?schema=public
      JWT_SECRET: change-this-secret-in-production
      HUGGINGFACE_API_TOKEN: your_huggingface_token_here
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    container_name: higgsfield-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: vibhor@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
